version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kimy-postgres
    environment:
      POSTGRES_DB: kimy_thesis
      POSTGRES_USER: kimy
      POSTGRES_PASSWORD: kimy_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kimy -d kimy_thesis" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kimy-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kimy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    image: node:20
    container_name: kimy-api
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://kimy:kimy_secret_2026@postgres:5432/kimy_thesis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - PRISMA_NO_DOTENV=1
    command: sh -c "npm install && npm run db:generate && npm run dev --workspace=apps/api"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:20
    container_name: kimy-web
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    command: sh -c "npm install && npm run dev --workspace=apps/web"
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
